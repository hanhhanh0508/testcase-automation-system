# ── Database ──────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/testcase_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── File upload ────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
# ── Thêm vào application.properties hiện tại ──────────────────

# Selenium target URL (app đang được test)
selenium.target.baseUrl=http://localhost:5173

# Thời gian chờ tối đa cho mỗi Selenium action (giây)
selenium.timeout.seconds=10
# ── JWT ────────────────────────────────────────────────────────
# THAY secret bằng chuỗi ngẫu nhiên >= 32 ký tự trong production!
app.jwt.secret=testcase-super-secret-key-change-in-prod-32chars
app.jwt.expiration-ms=86400000

# 86400000ms = 24 giờ