# ── Database ──────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/testcase_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── File upload ────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── JWT ────────────────────────────────────────────────────────
app.jwt.secret=testcase-super-secret-key-change-in-prod-32chars
app.jwt.expiration-ms=86400000

# ── API Testing (RestTemplate-based, thay thế Selenium) ───────
# URL gốc của ứng dụng cần kiểm thử
app.test.target.baseUrl=http://localhost:8080

# Timeout (ms) cho mỗi HTTP request trong quá trình test
app.test.timeout.ms=5000

# ── Logging ───────────────────────────────────────────────────
logging.level.com.testcase=INFO
logging.level.org.springframework.web.client=DEBUG